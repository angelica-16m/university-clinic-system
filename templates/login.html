<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSU Clinic Login</title>
    <style>
        :root { 
            --bsu-red: #8B0000; 
            --error-bg: #f8d7da;
            --error-text: #721c24;
        }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .reg-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); 
            width: 400px; 
            text-align: center; 
            border-top: 6px solid var(--bsu-red); 
        }

        #error-container {
            display: none; 
            background-color: var(--error-bg);
            color: var(--error-text);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            border: 1px solid #f5c6cb;
        }

        .logo { width: 100px; margin-bottom: 15px; }
        h2 { color: var(--bsu-red); margin: 0 0 10px 0; }
        
        .login-toggle {
            display: flex;
            background: #eee;
            border-radius: 8px;
            margin-bottom: 25px;
            padding: 4px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            color: #555;
        }

        .toggle-btn.active {
            background: white;
            color: var(--bsu-red);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .login-section { display: none; }
        .login-section.active { display: block; }

        .field-label { 
            display: block; 
            text-align: left; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #333; 
            margin-bottom: 5px;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
        }

        button { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            color: white;
            background-color: var(--bsu-red);
        }

        .login-link { 
            display: inline-block; 
            margin-top: 20px; 
            font-size: 0.85rem; 
            color: #555; 
            text-decoration: none; 
        }
    </style>
</head>
<body>

<div class="reg-card">
    <img src="https://uploads.onecompiler.io/43gf84yfy/44nu2n4px/bsu.logo.png" alt="BSU Logo" class="logo">
    <h2>Clinic Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div id="error-container" style="display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="login-toggle">
        <div id="tab-student" class="toggle-btn active" onclick="switchLogin('student')">Student</div>
        <div id="tab-admin" class="toggle-btn" onclick="switchLogin('admin')">Admin</div>
    </div>

    <form id="loginForm" method="POST" action="/login">
        <input type="hidden" id="login-role" name="role" value="student">

        <div id="student-login" class="login-section active">
            <label class="field-label">SR-Code</label>
            <input type="text" id="sr_input" name="sr_code" placeholder="e.g. 20-12345" required>
            <label class="field-label">Password</label>
            <input type="password" id="sp_input" name="password" placeholder="••••••••" required>
            <button type="submit">Login as Student</button>
        </div>

        <div id="admin-login" class="login-section">
            <label class="field-label">Admin Username</label>
            <input type="text" id="au_input" name="admin_user" placeholder="Enter admin username" disabled>
            <label class="field-label">Password</label>
            <input type="password" id="ap_input" name="password" placeholder="••••••••" disabled>
            <button type="submit">Login as Admin</button>
        </div>
    </form>

    <a href="/register" class="login-link">Don't have an account? <b>Register here</b></a>
</div>

<script>
    function switchLogin(type) {
        // Elements
        const studentTab = document.getElementById('tab-student');
        const adminTab = document.getElementById('tab-admin');
        const studentSec = document.getElementById('student-login');
        const adminSec = document.getElementById('admin-login');
        const roleInput = document.getElementById('login-role');

        // Inputs (for enabling/disabling)
        const srIn = document.getElementById('sr_input');
        const spIn = document.getElementById('sp_input');
        const auIn = document.getElementById('au_input');
        const apIn = document.getElementById('ap_input');

        if(type === 'student') {
            studentTab.classList.add('active');
            adminTab.classList.remove('active');
            studentSec.classList.add('active');
            adminSec.classList.remove('active');
            roleInput.value = 'student';
            
            // Enable student, Disable admin
            srIn.disabled = false; spIn.disabled = false;
            srIn.required = true; spIn.required = true;
            auIn.disabled = true; apIn.disabled = true;
            auIn.required = false; apIn.required = false;
        } else {
            adminTab.classList.add('active');
            studentTab.classList.remove('active');
            adminSec.classList.add('active');
            studentSec.classList.remove('active');
            roleInput.value = 'admin';

            // Enable admin, Disable student
            auIn.disabled = false; apIn.disabled = false;
            auIn.required = true; apIn.required = true;
            srIn.disabled = true; spIn.disabled = true;
            srIn.required = false; spIn.required = false;
        }
    }
</script>

</body>
</html>
